name: update-packages

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Fix stale hashes after version bump
        run: |
          set -uo pipefail
          pkg="jopdf"
          for attempt in 1 2 3; do
            # Agregamos obligatoriamente --impure por si tu Flake depende de variables locales
            out=$(nix build ".#$pkg" --accept-flake-config --impure 2>&1) && break
            
            # Imprimimos TODO el output en el log para ver qué está pasando realmente en la web de GitHub
            echo "=== OUTPUT DE NIX BUILD (Intento $attempt) ==="
            echo "$out"
            echo "=============================================="
            
            got=$(printf '%s\n' "$out" | grep -oE 'got:[[:space:]]*sha256-[A-Za-z0-9+/=]+' | head -1 | grep -oE 'sha256-[A-Za-z0-9+/=]+')
            bad=$(printf '%s\n' "$out" | grep -oE 'specified:[[:space:]]*sha256-[A-Za-z0-9+/=]+' | head -1 | grep -oE 'sha256-[A-Za-z0-9+/=]+')
            
            if [ -n "$got" ] && [ -n "$bad" ] && [ "$got" != "$bad" ]; then
              echo "Fix $pkg: $bad -> $got"
              sed -i "s#$bad#$got#g" "pkgs/$pkg/package.nix"
            else
              echo "No se detectó diferencia de hashes. Terminando bucle."
              exit 1
            fi
          done

      - name: Format with alejandra
        run: nix run nixpkgs#alejandra -- -q .

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/update-jopdf
          delete-branch: true
          title: "chore: actualización forzada de hash para JOPDF"
          commit-message: "chore(jopdf): bump de hash remoto"
          body: "Actualización del hash para el paquete jopdf obtenida mediante nix build."
          labels: automated, dependencies
